name: 'PactSpec'
description: 'Validate, test, and optionally publish PactSpec agent specs in CI'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  spec:
    description: 'Path to .pactspec.json file. If omitted, auto-discovers all *.pactspec.json files.'
    required: false
    default: ''
  skill:
    description: 'Skill ID to run tests for. Omit to test all skills that have a testSuite.'
    required: false
    default: ''
  publish:
    description: 'Publish to the registry after passing validation and tests'
    required: false
    default: 'false'
  agent-id:
    description: 'Your agent identifier (X-Agent-ID header). Required when publish: true.'
    required: false
    default: ''
  publisher-key:
    description: 'Publisher API key (X-Publisher-Key header). Required to update existing agents.'
    required: false
    default: ''
  publish-token:
    description: 'Admin publish token (X-Publish-Token header). Alternative to publisher-key.'
    required: false
    default: ''
  registry:
    description: 'PactSpec registry URL'
    required: false
    default: 'https://pactspec.dev'
  cli-version:
    description: 'Version of @pactspec/cli to install'
    required: false
    default: 'latest'

outputs:
  valid:
    description: 'Whether the spec(s) passed schema validation (true/false)'
    value: ${{ steps.validate.outputs.valid }}
  published:
    description: 'Whether the spec was published to the registry (true/false)'
    value: ${{ steps.publish.outputs.published }}
  agent-url:
    description: 'Registry URL of the published agent (if publish: true succeeded)'
    value: ${{ steps.publish.outputs.agent-url }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install @pactspec/cli
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
      run: npm install -g "@pactspec/cli@${CLI_VERSION}"

    - name: Discover spec files
      id: discover
      shell: bash
      env:
        SPEC: ${{ inputs.spec }}
      run: |
        if [ -n "$SPEC" ]; then
          echo "specs=$SPEC" >> "$GITHUB_OUTPUT"
        else
          FOUND=$(find . -name '*.pactspec.json' -not -path './node_modules/*' | tr '\n' ' ')
          if [ -z "$FOUND" ]; then
            echo "::error::No .pactspec.json files found. Specify one with the 'spec' input or add a .pactspec.json file."
            exit 1
          fi
          echo "Auto-discovered: $FOUND"
          echo "specs=$FOUND" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate spec(s)
      id: validate
      shell: bash
      env:
        SPECS: ${{ steps.discover.outputs.specs }}
      run: |
        FAILED=0
        for SPEC in $SPECS; do
          echo "Validating $SPEC"
          pactspec validate "$SPEC" || FAILED=1
        done
        if [ $FAILED -eq 0 ]; then
          echo "valid=true" >> "$GITHUB_OUTPUT"
        else
          echo "valid=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Run test suite(s)
      shell: bash
      env:
        SPECS: ${{ steps.discover.outputs.specs }}
        SKILL: ${{ inputs.skill }}
      run: |
        FAILED=0
        for SPEC in $SPECS; do
          if [ -n "$SKILL" ]; then
            echo "Testing $SPEC skill: $SKILL"
            pactspec test "$SPEC" --skill "$SKILL" || FAILED=1
          else
            SKILLS=$(node -e "
              const s = JSON.parse(require('fs').readFileSync('$SPEC', 'utf8'));
              const ids = s.skills
                .filter(sk => sk.testSuite && sk.testSuite.url)
                .map(sk => sk.id);
              console.log(ids.join(' '));
            " 2>/dev/null)

            if [ -z "$SKILLS" ]; then
              echo "No skills with testSuite.url in $SPEC — skipping"
              continue
            fi

            for SKILL_ID in $SKILLS; do
              echo "Testing $SPEC skill: $SKILL_ID"
              pactspec test "$SPEC" --skill "$SKILL_ID" || FAILED=1
            done
          fi
        done
        exit $FAILED

    - name: Publish to registry
      id: publish
      if: inputs.publish == 'true'
      shell: bash
      env:
        SPECS: ${{ steps.discover.outputs.specs }}
        AGENT_ID: ${{ inputs.agent-id }}
        PUBLISHER_KEY: ${{ inputs.publisher-key }}
        PUBLISH_TOKEN: ${{ inputs.publish-token }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        if [ -z "$AGENT_ID" ]; then
          echo "::error::publish: true requires agent-id to be set"
          exit 1
        fi

        LAST_URL=""
        for SPEC in $SPECS; do
          ARGS=("$SPEC" --agent-id "$AGENT_ID" --registry "$REGISTRY")
          if [ -n "$PUBLISHER_KEY" ]; then ARGS+=(--publisher-key "$PUBLISHER_KEY"); fi
          if [ -n "$PUBLISH_TOKEN" ]; then ARGS+=(--publish-token "$PUBLISH_TOKEN"); fi

          echo "Publishing $SPEC"
          OUTPUT=$(pactspec publish "${ARGS[@]}" 2>&1)
          echo "$OUTPUT"

          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+/agents/[^ ]+' | head -1)
          if [ -n "$URL" ]; then LAST_URL="$URL"; fi
        done

        echo "published=true" >> "$GITHUB_OUTPUT"
        echo "agent-url=$LAST_URL" >> "$GITHUB_OUTPUT"
